# Render Blueprint для AI-воркшопа правления Райффайзен (3 мая 2026).
#
# Что делает:
# - Создаёт 6 web-сервисов (по одному на блок), каждый из своего Dockerfile.
# - Авто-деплой на каждый push в main, но Render через buildFilter
#   пересобирает только тот сервис, чья папка реально менялась
#   (изменения в /contracts/ триггерят все).
# - Каждому блоку через env инжектируются URL-ы соседей в виде
#   NEIGHBOR_<блок>=https://raif-<блок>.onrender.com — агент знает
#   куда стучаться через httpx.get(os.environ["NEIGHBOR_RISK"] + "/policy").
#
# Однократная настройка в UI Render:
#  1. New → Blueprint → Connect repo ErokhinVi/AI-Workshop.
#  2. Render найдёт этот файл, покажет план: 6 web services. Apply.
#  3. ~5-10 минут на первую сборку всех 6.
#  4. URL-ы стабильные: https://raif-<блок>.onrender.com
#
# План free для всех — instances засыпают после 15 мин, первый запрос
# +20-30 сек cold start. Для воркшопа норм.
#
# Общие секреты (DATABASE_URL, OPENAI_API_KEY) — в одной env-группе
# `ai-workshop-shared`, подключённой ко всем сервисам через fromGroup.
# Значения задаются один раз: dashboard.render.com → Env Groups →
# ai-workshop-shared → Environment.

envVarGroups:
  - name: ai-workshop-shared
    envVars:
      # Postgres-база, которую ты создал в UI Render.
      # Положи сюда Internal Database URL (быстрее и не идёт через
      # внешний интернет — соединение между сервисами Render).
      - key: DATABASE_URL
        sync: false

      # Ключ к внешнему OpenAI (или совместимому провайдеру) — ходит
      # из IT-блока. Остальные блоки общаются с моделью через IT,
      # ключ им не нужен, но shared не вредит.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini

services:

  # ---------------- CEO Office (Сергей Монин) ----------------
  - type: web
    name: raif-ceo
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./ceo/Dockerfile
    dockerContext: .
    rootDir: .
    buildFilter:
      paths:
        - ceo/**
        - contracts/**
        - render.yaml
    envVars:
      - fromGroup: ai-workshop-shared
      - key: BLOCK_NAME
        value: ceo
      - key: NEIGHBOR_CIB
        value: https://raif-cib.onrender.com
      - key: NEIGHBOR_RETAIL
        value: https://raif-retail.onrender.com
      - key: NEIGHBOR_IT
        value: https://raif-it.onrender.com
      - key: NEIGHBOR_FINANCE
        value: https://raif-finance.onrender.com
      - key: NEIGHBOR_RISK
        value: https://raif-risk.onrender.com

