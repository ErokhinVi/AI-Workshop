# Render Blueprint для AI-воркшопа: 2 банка-команды + симулятор.
#
# Однократно в UI Render:
#  1. New → Blueprint → Connect repo → выбрать ветку.
#  2. Render покажет 3 web-сервиса + 1 Postgres. Apply.
#  3. В env-группе ai-workshop-shared задать OPENAI_API_KEY и ADMIN_TOKEN.

databases:
  - name: raif-workshop-db
    plan: free
    region: oregon

envVarGroups:
  - name: ai-workshop-shared
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ADMIN_TOKEN
        sync: false

services:
  - type: web
    name: raif-team-a
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./team_a/Dockerfile
    dockerContext: .
    rootDir: .
    buildFilter:
      paths: [team_a/**, seed/**, render.yaml]
    envVars:
      - fromGroup: ai-workshop-shared
      - key: TEAM_NAME
        value: team_a

  - type: web
    name: raif-team-b
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./team_b/Dockerfile
    dockerContext: .
    rootDir: .
    buildFilter:
      paths: [team_b/**, seed/**, render.yaml]
    envVars:
      - fromGroup: ai-workshop-shared
      - key: TEAM_NAME
        value: team_b

  - type: web
    name: raif-simulator
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./simulator/Dockerfile
    dockerContext: .
    rootDir: .
    buildFilter:
      paths: [simulator/**, render.yaml]
    envVars:
      - fromGroup: ai-workshop-shared
      - key: BANK_A_URL
        value: https://raif-team-a.onrender.com
      - key: BANK_B_URL
        value: https://raif-team-b.onrender.com
      - key: ACTIVE_TASK
        value: credit
      - key: DATABASE_URL
        fromDatabase:
          name: raif-workshop-db
          property: connectionString
