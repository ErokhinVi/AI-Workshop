name: Dashboard — build & deploy

# Авто-деплой live-дашборда воркшопа.
# Триггерится:
#  - на каждый push в main (любой коммит члена правления → новая страница);
#  - вручную через "Run workflow" (workflow_dispatch);
#  - раз в 5 минут как страховка, если push-событие почему-то пропустили.
#
# Однократная настройка в GitHub:
#  Settings → Pages → Source = "GitHub Actions".
#  После первого успешного запуска URL будет:
#   https://<owner>.github.io/<repo>/   (для AI-Workshop:  https://ErokhinVi.github.io/AI-Workshop/)

on:
  push:
    branches: [main]
    # Не триггерим сами себя: меняется только сборка _site/ внутри Action,
    # обратно в репо ничего не пишем — поэтому recursion невозможна.
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"  # страховочный ребилд раз в 5 минут

permissions:
  contents: read   # чтобы прочитать репо
  pages: write     # чтобы задеплоить
  id-token: write  # для аутентификации actions/deploy-pages

# Параллельные деплои не нужны — последний выигрывает.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout (full history — нужно для git log по блокам)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static dashboard (state.json + index.html → _site/)
        env:
          # Если CEO задеплоен — тянем бизнес-метрики. Если нет (или
          # таймаут) — scan.py молча вернёт null, фронт просто не
          # покажет блок.
          BANK_STATE_URL: https://raif-ceo.onrender.com/dashboard
        run: |
          python dashboard/build_static.py --out _site
          ls -la _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
